<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JacobReminder</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@600;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <span class="logo-badge">J</span>
        <span class="logo-text">JacobReminder</span>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-card">
        <h1>⏰ Set Your Reminder</h1>
        <p>Pick a time and enter your reminder text. Countdown will appear below!</p>

        <form id="reminderForm">
          <div class="form-group">
            <label for="reminderText">Reminder Text:</label>
            <input type="text" id="reminderText" placeholder="Enter reminder" required>
          </div>

          <div class="form-group">
            <label for="reminderTime">Set Time:</label>
            <input type="time" id="reminderTime" required>
          </div>

          <button type="submit" class="btn btn-primary">Set Reminder</button>
        </form>

        <div id="remindersList"></div>
      </div>
    </section>
  </main>

  <footer>
    © 2026 JacobReminder • Built by Jacob 💙
  </footer>

  <script type="module" src="/renderer.js"></script>
</body>

</html>
